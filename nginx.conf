server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect tất cả route về index.html
    # Bắt buộc nếu dùng React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls sang backend
    # Mọi request /api/... sẽ được chuyển sang http://backend:8080
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Cache ảnh, JS, CSS trong 1 năm
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Bật gzip để giảm dung lượng truyền tải
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}